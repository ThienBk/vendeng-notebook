<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vendeng Vocabulary</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: linear-gradient(135deg, #0f2027, #2c5364);
  display: flex;
  justify-content: center;
  padding: 20px;
  color: #fff;
}

.app {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  padding: 20px;
  width: 100%;
  max-width: 1000px;
  border-radius: 20px;
}

.tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  margin: 10px 0;
}

.tab {
  padding: 8px 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
}

.tab.active {
  background: linear-gradient(135deg,#4facfe,#00f2fe);
}

.input-group {
  display: grid;
  grid-template-columns: 1fr 1fr 2fr auto;
  gap: 8px;
  margin: 10px 0;
}

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: rgba(255,255,255,0.15);
  color: white;
}

button {
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.add-btn { background: #00c6ff; }
.delete-btn { background: red; }

table {
  width: 100%;
}

td, th {
  padding: 10px;
}

</style>
</head>

<body>

<div class="app">

<h2>📘 Vendeng Vocabulary</h2>

<div id="tabs" class="tabs"></div>

<div class="input-group">
  <input id="word" placeholder="Từ vựng">
  <input id="phonetic" placeholder="Phiên âm">
  <input id="meaning" placeholder="Nghĩa">
  <button class="add-btn" onclick="addWord()">Thêm</button>
</div>

<table>
<thead>
<tr>
<th>#</th>
<th>Từ</th>
<th>Phiên âm</th>
<th>Nghĩa</th>
<th></th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

</div>

<!-- Firebase v8 (ổn định nhất) -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>
// 🔥 DÁN CONFIG FIREBASE CỦA BẠN VÀO ĐÂY
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "vendeng.firebaseapp.com",
  projectId: "vendeng",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentPage = 1;
const totalPages = 20;

/* Tabs */
function renderTabs() {
  const tabs = document.getElementById("tabs");
  tabs.innerHTML = "";

  for (let i = 1; i <= totalPages; i++) {
    const tab = document.createElement("div");
    tab.className = "tab " + (i === currentPage ? "active" : "");
    tab.innerText = i;

    tab.onclick = () => {
      currentPage = i;
      renderTabs();
      loadData();
    };

    tabs.appendChild(tab);
  }
}

/* Load */
async function loadData() {
  const doc = await db.collection("vendeng")
    .doc("page_" + currentPage)
    .get();

  const data = doc.exists ? doc.data().items : [];
  renderList(data || []);
}

/* Save */
async function saveData(data) {
  await db.collection("vendeng")
    .doc("page_" + currentPage)
    .set({ items: data });
}

/* Render */
function renderList(data) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach((item, i) => {
    list.innerHTML += `
    <tr>
      <td>${i+1}</td>
      <td>${item.word}</td>
      <td>${item.phonetic}</td>
      <td>${item.meaning}</td>
      <td>
        <button class="delete-btn" onclick="deleteWord(${i})">Xóa</button>
      </td>
    </tr>`;
  });
}

/* Add */
async function addWord() {
  const word = document.getElementById("word").value.trim();
  const phonetic = document.getElementById("phonetic").value.trim();
  const meaning = document.getElementById("meaning").value.trim();

  if (!word || !meaning) return;

  const doc = await db.collection("vendeng")
    .doc("page_" + currentPage)
    .get();

  let data = doc.exists ? doc.data().items : [];

  data.push({ word, phonetic, meaning });

  await saveData(data);
  loadData();

  document.getElementById("word").value = "";
  document.getElementById("phonetic").value = "";
  document.getElementById("meaning").value = "";
}

/* Delete */
async function deleteWord(i) {
  const doc = await db.collection("vendeng")
    .doc("page_" + currentPage)
    .get();

  let data = doc.data().items;
  data.splice(i,1);

  await saveData(data);
  loadData();
}

/* Enter */
document.querySelectorAll("#word,#phonetic,#meaning").forEach(el=>{
  el.addEventListener("keydown",e=>{
    if(e.key==="Enter"){
      addWord();
    }
  });
});

/* Init */
renderTabs();
loadData();

</script>

</body>
</html>
