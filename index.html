<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YingShan Vocabulary PRO</title>

    <style>
      body {
        font-family: -apple-system, sans-serif;
        background: linear-gradient(135deg, #0f2027, #2c5364);
        display: flex;
        justify-content: center;
        padding: 20px;
        color: #fff;
      }

      .app {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        padding: 20px;
        width: 100%;
        max-width: 1100px;
        border-radius: 20px;
      }

      .tabs {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        margin: 10px 0;
      }

      .tab {
        padding: 8px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.1);
        cursor: pointer;
      }

      .tab.active {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
      }

      .topic input {
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        margin-bottom: 10px;
        width: 100%;
      }

      select {
        padding: 8px;
        border-radius: 8px;
        margin-bottom: 10px;
      }

      .input-group {
        display: grid;
        grid-template-columns: 1fr 1fr 2fr auto;
        gap: 8px;
        margin: 10px 0;
      }

      input {
        padding: 10px;
        border-radius: 10px;
        border: none;
        background: rgba(255, 255, 255, 0.15);
        color: white;
      }

      button {
        padding: 8px 12px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
      }

      .add-btn { background: #00c6ff; }
      .delete-btn { background: red; }
      .edit-btn { background: orange; }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th, td {
        padding: 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        text-align: left;
      }

      td:first-child { width: 50px; text-align: center; }
      th:last-child, td:last-child { width: 140px; text-align: center; }

      .actions {
        display: flex;
        justify-content: center;
        gap: 6px;
      }

      @media (max-width: 768px) {
        body { padding: 10px; }
        .app { padding: 12px; }
        .input-group { grid-template-columns: 1fr; }
        .add-btn { width: 100%; }
        table { display: block; overflow-x: auto; white-space: nowrap; }
        th, td { padding: 8px; font-size: 13px; }
        .actions button { padding: 6px 8px; font-size: 12px; }
      }
    </style>
  </head>

  <body>
    <div class="app">
      <h2>📘 YingShan Vocabulary</h2>

      <div class="topic">
        <input id="topicInput" placeholder="Topic..." />
      </div>

      <div id="tabs" class="tabs"></div>

      <select id="filter" onchange="renderList()">
        <option value="">-- Bộ lọc --</option>
        <option value="length">Số nét tăng dần</option>
        <option value="date">Ngày mới nhất</option>
      </select>

      <input type="file" id="excelFile" accept=".xlsx" />
      <button onclick="importExcel()">Import Excel</button>

      <div class="input-group">
        <input id="word" placeholder="Từ vựng" />
        <input id="phonetic" placeholder="Phiên âm" />
        <input id="meaning" placeholder="Nghĩa" />
        <button class="add-btn" onclick="addWord()">Thêm</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Từ</th>
            <th>Phiên âm</th>
            <th>Nghĩa</th>
            <th>Ngày</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyAFQmjy1RkMe_xhbFScVLAIYu-VOrM5gtw",
        authDomain: "voca-web-9a1e7.firebaseapp.com",
        projectId: "voca-web-9a1e7",
        storageBucket: "voca-web-9a1e7.firebasestorage.app",
        messagingSenderId: "296416317837",
        appId: "1:296416317837:web:4f978b3123a7808a922dc4",
        measurementId: "G-XD8CYFZ342",
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      let currentPage = 1;
      const totalPages = 20;

      /* ====================== TABS ====================== */
      function renderTabs() {
        const tabs = document.getElementById("tabs");
        tabs.innerHTML = "";
        for (let i = 1; i <= totalPages; i++) {
          const tab = document.createElement("div");
          tab.className = `tab ${i === currentPage ? "active" : ""}`;
          tab.innerText = i;
          tab.onclick = () => {
            currentPage = i;
            renderTabs();
            loadAll();
          };
          tabs.appendChild(tab);
        }
      }

      /* ====================== TOPIC ====================== */
      const topicInput = document.getElementById("topicInput");

      async function saveTopic() {
        const topic = topicInput.value.trim();
        await db.collection("topic").doc("page_" + currentPage).set({ topic });
      }

      async function loadTopic() {
        const doc = await db.collection("topic").doc("page_" + currentPage).get();
        topicInput.value = doc.exists ? doc.data().topic : "";
      }

      topicInput.addEventListener("input", saveTopic);

      /* ====================== DATA ====================== */
      async function getData() {
        const doc = await db.collection("voca-web").doc("page_" + currentPage).get();
        return doc.exists ? doc.data().items || [] : [];
      }

      async function saveData(data) {
        await db.collection("voca-web").doc("page_" + currentPage).set({ items: data });
      }

      /* ====================== RENDER (ĐÃ SỬA) ====================== */
      async function renderList() {
        let originalData = await getData();
        let displayData = [...originalData]; // copy để sort

        const filter = document.getElementById("filter").value;

        if (filter === "length") {
          displayData.sort((a, b) => (a.word || "").length - (b.word || "").length);
        } else if (filter === "date") {
          displayData.sort((a, b) => (b.time || 0) - (a.time || 0));
        }

        // Tính original index cho từng dòng hiển thị
        const originalIndices = displayData.map(item => originalData.indexOf(item));

        const list = document.getElementById("list");
        list.innerHTML = "";

        displayData.forEach((item, displayIdx) => {
          const origIdx = originalIndices[displayIdx];
          list.innerHTML += `
            <tr>
              <td>${displayIdx + 1}</td>
              <td>${item.word || ""}</td>
              <td>${item.phonetic || ""}</td>
              <td>${item.meaning || ""}</td>
              <td>${item.time ? new Date(item.time).toLocaleDateString("vi-VN") : ""}</td>
              <td class="actions">
                <button class="edit-btn" onclick="editWord(${origIdx})">Sửa</button>
                <button class="delete-btn" onclick="deleteWord(${origIdx})">Xóa</button>
              </td>
            </tr>`;
        });
      }

      /* ====================== ADD ====================== */
      async function addWord() {
        const w = document.getElementById("word").value.trim();
        const p = document.getElementById("phonetic").value.trim();
        const m = document.getElementById("meaning").value.trim();

        if (!w || !m) return;

        let data = await getData();
        data.push({
          word: w,
          phonetic: p,
          meaning: m,
          time: Date.now()
        });

        await saveData(data);
        loadAll();

        // Clear input
        document.getElementById("word").value = "";
        document.getElementById("phonetic").value = "";
        document.getElementById("meaning").value = "";
      }

      /* ====================== DELETE (ĐÃ SỬA) ====================== */
      async function deleteWord(originalIndex) {
        let data = await getData();
        if (originalIndex < 0 || originalIndex >= data.length) return;

        data.splice(originalIndex, 1);
        await saveData(data);
        loadAll();
      }

      /* ====================== EDIT (ĐÃ SỬA) ====================== */
      async function editWord(originalIndex) {
        let data = await getData();
        if (originalIndex < 0 || originalIndex >= data.length) return;

        const item = data[originalIndex];

        const w = prompt("Từ:", item.word || "");
        const p = prompt("Phiên âm:", item.phonetic || "");
        const m = prompt("Nghĩa:", item.meaning || "");

        if (w && m) {
          data[originalIndex] = {
            ...item,
            word: w.trim(),
            phonetic: p.trim(),
            meaning: m.trim()
          };
          await saveData(data);
          loadAll();
        }
      }

      /* ====================== IMPORT EXCEL ====================== */
      function importExcel() {
        const file = document.getElementById("excelFile").files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (e) => {
          const data = new Uint8Array(e.target.result);
          const wb = XLSX.read(data, { type: "array" });
          const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });

          let current = await getData();

          rows.forEach((r) => {
            if (r.length >= 3 && r[0] && r[2]) {
              current.push({
                word: String(r[0]).trim(),
                phonetic: String(r[1] || "").trim(),
                meaning: String(r[2]).trim(),
                time: Date.now()
              });
            }
          });

          await saveData(current);
          loadAll();
        };
        reader.readAsArrayBuffer(file);
      }

      /* ====================== ENTER KEY ====================== */
      document.querySelectorAll("#word,#phonetic,#meaning").forEach(el => {
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter") addWord();
        });
      });

      /* ====================== LOAD ====================== */
      function loadAll() {
        renderList();
        loadTopic();
      }

      /* ====================== INIT ====================== */
      renderTabs();
      loadAll();
    </script>
  </body>
</html>
