<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vendeng Vocabulary PRO</title>

    <style>
      body {
        font-family: -apple-system, sans-serif;
        background: linear-gradient(135deg, #0f2027, #2c5364);
        display: flex;
        justify-content: center;
        padding: 20px;
        color: #fff;
        margin: 0;
      }

      .app {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);
        padding: 20px;
        width: 100%;
        max-width: 1100px;
        border-radius: 20px;
      }

      .tabs {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        margin: 10px 0;
      }

      .tab {
        padding: 8px 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.1);
        cursor: pointer;
      }

      .tab.active {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
      }

      .topic input {
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        margin-bottom: 10px;
        width: 100%;
      }

      select {
        padding: 8px;
        border-radius: 8px;
        margin-bottom: 10px;
      }

      .input-group {
        display: grid;
        grid-template-columns: 1fr 1fr 2fr auto;
        gap: 8px;
        margin: 10px 0;
      }

      input {
        padding: 10px;
        border-radius: 10px;
        border: none;
        background: rgba(255, 255, 255, 0.15);
        color: white;
      }

      button {
        padding: 8px 12px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
      }

      .add-btn { background: #00c6ff; }
      .delete-btn { background: red; }
      .edit-btn { background: orange; }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th, td {
        padding: 12px 10px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        text-align: left;
        transition: all 0.2s ease;
      }

      /* Highlight khi hover */
      tr {
        cursor: pointer;
      }

      tr:hover {
        background: rgba(255, 255, 255, 0.15) !important;
        transform: scale(1.02);
      }

      td:first-child { width: 50px; text-align: center; }
      th:last-child, td:last-child { width: 140px; text-align: center; }

      .actions {
        display: flex;
        justify-content: center;
        gap: 6px;
      }

      /* ====================== POPUP ====================== */
      .popup {
        display: none;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }

      .popup-content {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        padding: 30px 40px;
        border-radius: 20px;
        max-width: 90%;
        width: 500px;
        text-align: center;
        border: 1px solid rgba(255,255,255,0.2);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      .popup-word {
        font-size: 2.8rem;
        font-weight: bold;
        margin: 10px 0;
        color: #00f2fe;
      }

      .popup-phonetic {
        font-size: 1.5rem;
        color: #a0e7ff;
        margin: 8px 0;
      }

      .popup-meaning {
        font-size: 1.4rem;
        line-height: 1.5;
        margin: 20px 0;
        color: #fff;
      }

      .popup-close {
        margin-top: 20px;
        padding: 10px 25px;
        background: #ff3b5c;
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 1.1rem;
        cursor: pointer;
      }

      @media (max-width: 768px) {
        .popup-content {
          padding: 25px 20px;
          width: 95%;
        }
        .popup-word { font-size: 2.2rem; }
        .popup-phonetic { font-size: 1.3rem; }
        .popup-meaning { font-size: 1.25rem; }
      }
    </style>
  </head>

  <body>
    <div class="app">
      <h2>📘 Vendeng Vocabulary</h2>

      <div class="topic">
        <input id="topicInput" placeholder="Topic..." />
      </div>

      <div id="tabs" class="tabs"></div>

      <select id="filter" onchange="renderList()">
        <option value="">-- Bộ lọc --</option>
        <option value="length">Số nét tăng dần</option>
        <option value="date">Ngày mới nhất</option>
      </select>

      <input type="file" id="excelFile" accept=".xlsx" />
      <button onclick="importExcel()">Import Excel</button>

      <div class="input-group">
        <input id="word" placeholder="Từ vựng" />
        <input id="phonetic" placeholder="Phiên âm" />
        <input id="meaning" placeholder="Nghĩa" />
        <button class="add-btn" onclick="addWord()">Thêm</button>
      </div>

      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Từ</th>
            <th>Phiên âm</th>
            <th>Nghĩa</th>
            <th>Ngày</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="list"></tbody>
      </table>
    </div>

    <!-- POPUP -->
    <div id="popup" class="popup">
      <div class="popup-content">
        <div id="popup-word" class="popup-word"></div>
        <div id="popup-phonetic" class="popup-phonetic"></div>
        <div id="popup-meaning" class="popup-meaning"></div>
        <button class="popup-close" onclick="closePopup()">Đóng</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyB5T1uiQm0vuIs7v12-9pMbnASnYxe0Aho",
        authDomain: "vendeng-fa5c1.firebaseapp.com",
        projectId: "vendeng-fa5c1",
        storageBucket: "vendeng-fa5c1.firebasestorage.app",
        messagingSenderId: "487534407290",
        appId: "1:487534407290:web:79633cdec25c6b51cf55c3",
      };

      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      let currentPage = 1;
      const totalPages = 20;

      /* ====================== TABS ====================== */
      function renderTabs() {
        const tabs = document.getElementById("tabs");
        tabs.innerHTML = "";
        for (let i = 1; i <= totalPages; i++) {
          const tab = document.createElement("div");
          tab.className = `tab ${i === currentPage ? "active" : ""}`;
          tab.innerText = i;
          tab.onclick = () => {
            currentPage = i;
            renderTabs();
            loadAll();
          };
          tabs.appendChild(tab);
        }
      }

      /* ====================== TOPIC ====================== */
      const topicInput = document.getElementById("topicInput");

      async function saveTopic() {
        const topic = topicInput.value.trim();
        await db.collection("topic").doc("page_" + currentPage).set({ topic });
      }

      async function loadTopic() {
        const doc = await db.collection("topic").doc("page_" + currentPage).get();
        topicInput.value = doc.exists ? doc.data().topic : "";
      }

      topicInput.addEventListener("input", saveTopic);

      /* ====================== DATA ====================== */
      async function getData() {
        const doc = await db.collection("vendeng").doc("page_" + currentPage).get();
        return doc.exists ? doc.data().items || [] : [];
      }

      async function saveData(data) {
        await db.collection("vendeng").doc("page_" + currentPage).set({ items: data });
      }

      /* ====================== RENDER ====================== */
      async function renderList() {
        let originalData = await getData();
        let displayData = [...originalData];

        const filter = document.getElementById("filter").value;

        if (filter === "length") {
          displayData.sort((a, b) => (a.word || "").length - (b.word || "").length);
        } else if (filter === "date") {
          displayData.sort((a, b) => (b.time || 0) - (a.time || 0));
        }

        const originalIndices = displayData.map(item => originalData.indexOf(item));

        const list = document.getElementById("list");
        list.innerHTML = "";

        displayData.forEach((item, displayIdx) => {
          const origIdx = originalIndices[displayIdx];
          const rowHTML = `
            <tr onclick="showPopup(${origIdx})">
              <td>${displayIdx + 1}</td>
              <td>${item.word || ""}</td>
              <td>${item.phonetic || ""}</td>
              <td>${item.meaning || ""}</td>
              <td>${item.time ? new Date(item.time).toLocaleDateString("vi-VN") : ""}</td>
              <td class="actions">
                <button class="edit-btn" onclick="event.stopImmediatePropagation(); editWord(${origIdx});">Sửa</button>
                <button class="delete-btn" onclick="event.stopImmediatePropagation(); deleteWord(${origIdx});">Xóa</button>
              </td>
            </tr>`;
          list.innerHTML += rowHTML;
        });
      }

      /* ====================== POPUP ====================== */
      function showPopup(originalIndex) {
        getData().then(data => {
          if (originalIndex < 0 || originalIndex >= data.length) return;
          const item = data[originalIndex];

          document.getElementById("popup-word").textContent = item.word || "";
          document.getElementById("popup-phonetic").textContent = item.phonetic || "";
          document.getElementById("popup-meaning").textContent = item.meaning || "";

          document.getElementById("popup").style.display = "flex";
        });
      }

      function closePopup() {
        document.getElementById("popup").style.display = "none";
      }

      /* ====================== ADD ====================== */
      async function addWord() {
        const w = document.getElementById("word").value.trim();
        const p = document.getElementById("phonetic").value.trim();
        const m = document.getElementById("meaning").value.trim();

        if (!w || !m) return;

        let data = await getData();
        data.push({
          id: Date.now() + "_" + Math.random().toString(36).substr(2, 9),
          word: w,
          phonetic: p,
          meaning: m,
          time: Date.now()
        });

        await saveData(data);
        loadAll();

        document.getElementById("word").value = "";
        document.getElementById("phonetic").value = "";
        document.getElementById("meaning").value = "";
      }

      /* ====================== DELETE ====================== */
      async function deleteWord(originalIndex) {
        let data = await getData();
        if (originalIndex < 0 || originalIndex >= data.length) return;

        if (confirm("Bạn có chắc muốn xóa từ này?")) {
          data.splice(originalIndex, 1);
          await saveData(data);
          loadAll();
        }
      }

      /* ====================== EDIT ====================== */
      async function editWord(originalIndex) {
        let data = await getData();
        if (originalIndex < 0 || originalIndex >= data.length) return;

        const item = data[originalIndex];

        const w = prompt("Từ:", item.word || "");
        const p = prompt("Phiên âm:", item.phonetic || "");
        const m = prompt("Nghĩa:", item.meaning || "");

        if (w && m) {
          data[originalIndex] = {
            ...item,
            word: w.trim(),
            phonetic: p.trim(),
            meaning: m.trim()
          };
          await saveData(data);
          loadAll();
        }
      }

      /* ====================== IMPORT EXCEL ====================== */
      function importExcel() {
        const file = document.getElementById("excelFile").files[0];
        if (!file) {
          alert("Vui lòng chọn file Excel!");
          return;
        }

        const reader = new FileReader();
        reader.onload = async (e) => {
          try {
            const dataArray = new Uint8Array(e.target.result);
            const wb = XLSX.read(dataArray, { type: "array" });
            const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });

            let current = await getData();
            let addedCount = 0;

            rows.forEach((r) => {
              if (r.length >= 3 && String(r[0]).trim() && String(r[2]).trim()) {
                current.push({
                  id: Date.now() + "_" + Math.random().toString(36).substr(2, 9),
                  word: String(r[0]).trim(),
                  phonetic: String(r[1] || "").trim(),
                  meaning: String(r[2]).trim(),
                  time: Date.now()
                });
                addedCount++;
              }
            });

            if (addedCount === 0) {
              alert("Không tìm thấy dữ liệu hợp lệ!");
              return;
            }

            await saveData(current);
            loadAll();
            alert(`Đã import thành công ${addedCount} từ vựng!`);
          } catch (error) {
            alert("Import thất bại! Vui lòng kiểm tra file Excel.");
          }
        };
        reader.readAsArrayBuffer(file);
      }

      /* ====================== ENTER KEY ====================== */
      document.querySelectorAll("#word,#phonetic,#meaning").forEach(el => {
        el.addEventListener("keydown", (e) => {
          if (e.key === "Enter") addWord();
        });
      });

      /* ====================== LOAD ====================== */
      function loadAll() {
        renderList();
        loadTopic();
      }

      /* ====================== INIT ====================== */
      renderTabs();
      loadAll();

      // Đóng popup khi click ra ngoài
      document.getElementById("popup").addEventListener("click", function(e) {
        if (e.target === this) closePopup();
      });
    </script>
  </body>
</html>
